version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: liverpool-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: liverpool_db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: liverpool-app
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/liverpool_db
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
